name: CI

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  NODE_VERSION: 24

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm run validate

      - name: Build action
        run: pnpm run build

      - name: Verify action bundle
        run: node --check dist/index.cjs

      - name: Check dist freshness
        id: dist_freshness
        continue-on-error: true
        run: |
          git diff --exit-code --stat -- dist/index.cjs \
          || (echo "##[error] found changed dist/index.cjs after build. please run 'pnpm run build' and commit the updated bundle" \
              && exit 1)

      - name: Comment on stale dist bundle
        if: github.event_name == 'pull_request' && steps.dist_freshness.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          marker='<!-- dist-freshness-check -->'
          diff_stat="$(git diff --stat -- dist/index.cjs)"
          body=$(cat <<EOF
          $marker
          \`dist/index.cjs\` changed after \`pnpm run build\`.

          Please run \`pnpm run build\` and commit the regenerated bundle.

          \`\`\`text
          $diff_stat
          \`\`\`
          EOF
          )

          existing_id="$(
            gh api "repos/$GH_REPO/issues/$PR_NUMBER/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- dist-freshness-check -->"))) | .id' \
              | tail -n 1
          )"

          if [ -n "$existing_id" ]; then
            gh api --method PATCH "repos/$GH_REPO/issues/comments/$existing_id" -f body="$body" >/dev/null
          else
            gh api --method POST "repos/$GH_REPO/issues/$PR_NUMBER/comments" -f body="$body" >/dev/null
          fi

      - name: Fail on stale dist bundle
        if: steps.dist_freshness.outcome == 'failure'
        run: |
          echo "##[error] found changed dist/index.cjs after build. please run 'pnpm run build' and commit the updated bundle"
          exit 1

  integration:
    name: integration (${{ matrix.name }})
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            arch: amd64
            compile: cl.exe hello.c && hello.exe
          - name: arch aliases
            arch: Win32
            compile: cl.exe hello.c && hello.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Enable Developer Command Prompt
        uses: ./
        with:
          arch: ${{ matrix.arch }}

      - name: Compile and run C code
        shell: cmd
        run: ${{ matrix.compile }}

  cross-compile:
    name: cross-compile (${{ matrix.arch }})
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64_x86
            compile: cl.exe hello.c && hello.exe
          - arch: amd64_arm64
            compile: cl.exe hello.c && dumpbin /headers hello.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Enable Developer Command Prompt (${{ matrix.arch }})
        uses: ./
        with:
          arch: ${{ matrix.arch }}

      - name: Compile C code (${{ matrix.arch }})
        shell: cmd
        run: ${{ matrix.compile }}
