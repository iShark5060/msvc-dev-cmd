name: Release

permissions:
  contents: read

env:
  NODE_VERSION: 24

on:
  release:
    types: [published]

jobs:
  build-and-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Record source commit
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build action
        run: pnpm run build

      - name: Verify action bundle
        run: node --check dist/index.js

      - name: Attest action.yml
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: action.yml

      - name: Attest dist/index.js
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/index.js

      - name: Publish to release tag
        uses: iShark5060/build-and-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Push source tag
        shell: bash
        run: |
          TAGNAME="${{ github.event.release.tag_name }}-src"
          git tag "$TAGNAME" "${{ steps.source.outputs.sha }}"
          git push origin "$TAGNAME"
