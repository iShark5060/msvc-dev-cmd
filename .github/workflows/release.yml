name: Release

permissions:
  contents: read

env:
  NODE_VERSION: 24

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to build and publish
        required: true
        type: string

jobs:
  build-and-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Record source commit
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build action
        run: pnpm run build

      - name: Verify action bundle
        run: node --check dist/index.cjs

      - name: Attest action.yml
        uses: actions/attest@v4
        with:
          subject-path: action.yml

      - name: Attest dist/index.cjs
        uses: actions/attest@v4
        with:
          subject-path: dist/index.cjs

      - name: Publish to release tag
        uses: iShark5060/actions-build-and-tag@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Push source tag
        shell: bash
        run: |
          TAGNAME="${{ env.RELEASE_TAG }}-src"
          git tag "$TAGNAME" "${{ steps.source.outputs.sha }}"
          git push origin "$TAGNAME"
